---
# ============================================================================
# starship ロール - タスク定義
# ============================================================================
#
# 目的:
#   starship（高速でカスタマイズ可能なシェルプロンプト）をインストールします
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 参考:
#   - starship: https://starship.rs/
#

- name: starship をインストール
  community.general.homebrew:
    name: starship
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
    HOMEBREW_NO_VERIFY_ATTESTATIONS: "1"
    HOMEBREW_CURL_RETRIES: "3"
    CURL_CA_BUNDLE: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: starship のバージョンを確認
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/starship --version
  register: starship_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
  become: no

- name: starship インストール完了メッセージ
  ansible.builtin.debug:
    msg: |
      ================================================
      starship のインストールが完了しました！
      ================================================
      バージョン: {{ starship_version.stdout | default('確認失敗') }}
      ※ シェル設定は chezmoi で管理されます
        - ~/.bashrc に starship 初期化コードが含まれます
        - ~/.zshrc に starship 初期化コードが含まれます
        - ~/.config/starship.toml に設定ファイルがあります

      使用方法:
      # 新しいシェルセッションを開始するか、以下を実行:
      source ~/.bashrc

      # 設定ファイルをカスタマイズ:
      chezmoi edit ~/.config/starship.toml

      公式サイト: https://starship.rs/
      ================================================
  when: starship_version.rc == 0
