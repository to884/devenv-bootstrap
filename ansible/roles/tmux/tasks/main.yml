---
# ============================================================================
# tmux ロール - タスク定義
# ============================================================================
#
# 目的:
#   tmux（ターミナルマルチプレクサ）と PowerLine をインストールします
#   PowerLine は pipx を使用して独立した環境にインストールされます
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 参考:
#   - tmux: https://github.com/tmux/tmux
#   - tpm: https://github.com/tmux-plugins/tpm
#   - PowerLine: https://powerline.readthedocs.io/
#

- name: tmux をインストール
  community.general.homebrew:
    name: tmux
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
    HOMEBREW_NO_VERIFY_ATTESTATIONS: "1"
    HOMEBREW_CURL_RETRIES: "3"
    CURL_CA_BUNDLE: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: tpm（tmux plugin manager）をクローン
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ lookup('env', 'HOME') }}/.tmux/plugins/tpm"
    update: no
  become: no
  environment:
    GIT_SSL_CAINFO: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: pipx をインストール
  community.general.homebrew:
    name: pipx
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
    HOMEBREW_NO_VERIFY_ATTESTATIONS: "1"
    HOMEBREW_CURL_RETRIES: "3"
    CURL_CA_BUNDLE: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: PowerLine をインストール (pipx)
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/pipx install powerline-status
  register: pipx_install_powerline
  changed_when: "'installed package' in pipx_install_powerline.stdout"
  failed_when: 
    - pipx_install_powerline.rc != 0
    - "'already seems to be installed' not in pipx_install_powerline.stderr"
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"

- name: PowerLine 拡張セグメントを追加 (pipx inject)
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/pipx inject powerline-status powerline-mem-segment
  register: pipx_inject_segment
  changed_when: "'Injected package' in pipx_inject_segment.stdout"
  failed_when:
    - pipx_inject_segment.rc != 0
    - "'already seems to be installed' not in pipx_inject_segment.stderr"
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"

- name: .config ディレクトリを作成
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config"
    state: directory
    mode: '0755'
  become: no
- name: tmux のバージョンを確認
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/tmux -V
  register: tmux_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
  become: no
- name: PowerLine のバージョンを確認
  ansible.builtin.command: powerline --version
  register: powerline_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ lookup('env', 'HOME') }}/.local/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
  become: no

- name: tmux インストール完了メッセージ
  ansible.builtin.debug:
    msg: |
      ================================================
      tmux と PowerLine のインストールが完了しました！
      ================================================
      tmux バージョン: {{ tmux_version.stdout | default('確認失敗') }}
      PowerLine バージョン: {{ powerline_version.stdout | default('確認失敗') }}
      
      インストール済みコンポーネント:
      - powerline-status (pipxで管理される独立環境)
      - powerline-mem-segment (PowerLine拡張セグメント)
      
      PowerLine実行パス: ~/.local/bin/powerline
      
      ※ 設定ファイルは chezmoi で管理されます
        - ~/.tmux.conf
        - ~/.config/powerline/
      - ~/.config/powerline/ に PowerLine 設定を配置しました
      - ~/.tmux/plugins/tpm に tpm（プラグインマネージャー）をインストールしました

      使用方法:
      # tmux を起動して、プラグインをインストール
      tmux
      # tmux 内で以下のキーを押す:
      Prefix + I (大文字の I) でプラグインをインストール

      # プレフィックスキー（この設定では Ctrl+t）
      # デフォルトの Ctrl+b から変更されています

      # 基本操作:
      Ctrl+t d         - デタッチ
      Ctrl+t c         - 新しいウィンドウ
      Ctrl+t n/p       - 次/前のウィンドウ
      Ctrl+Shift+→/←   - ウィンドウ移動
      Ctrl+↑↓←→       - ペイン移動
      Ctrl+t r         - .tmux.conf リロード

      設定ファイル:
      ~/.tmux.conf       - tmux メイン設定
      ~/.config/powerline/ - PowerLine 設定

      PowerLine カスタマイズ:
      メモリセグメントを有効にするには、
      ~/.config/powerline/themes/tmux/tmux-theme.json を編集してください

      ================================================
