---
# ============================================================================
# uv ロール - タスク定義
# ============================================================================
#
# 目的:
#   uv（高速Pythonパッケージインストーラー）とuvxをインストールします
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 参考:
#   - uv: https://github.com/astral-sh/uv
#

- name: uv をインストール
  community.general.homebrew:
    name: uv
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
    HOMEBREW_NO_VERIFY_ATTESTATIONS: "1"
    HOMEBREW_CURL_RETRIES: "3"
    CURL_CA_BUNDLE: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: uv のバージョンを確認
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/uv --version
  register: uv_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
  become: no
- name: uv インストール完了メッセージ
  ansible.builtin.debug:
    msg: |
      ================================================
      uv のインストールが完了しました！
      ================================================
      バージョン: {{ uv_version.stdout | default('確認失敗') }}
      使用方法:
      # Pythonパッケージをインストール
      uv pip install <package>

      # 仮想環境を作成
      uv venv

      # ツールを実行（uvx）
      uvx <tool-name>

      # 例: ruffを実行
      uvx ruff check .
      ================================================
  when: uv_version.rc == 0
