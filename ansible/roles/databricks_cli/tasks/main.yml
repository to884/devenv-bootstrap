---
# ============================================================================
# databricks_cli ロール - タスク定義
# ============================================================================
#
# 目的:
#   Databricks CLI をインストールします
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 参考:
#   - Databricks CLI: https://docs.databricks.com/dev-tools/cli/index.html
#   - GitHub: https://github.com/databricks/cli
#

- name: Databricks tap を追加
  community.general.homebrew_tap:
    name: databricks/tap
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"

- name: Databricks CLI をインストール
  community.general.homebrew:
    name: databricks
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"

- name: Databricks CLI のバージョンを確認
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/databricks --version
  register: databricks_cli_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"

- name: Databricks CLI のバージョンを表示
  ansible.builtin.debug:
    msg: "Databricks CLI バージョン: {{ databricks_cli_version.stdout }}"
  when: databricks_cli_version.rc == 0
