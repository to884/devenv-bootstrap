---
# ============================================================================
# azure_cli ロール - タスク定義
# ============================================================================
#
# 目的:
#   Azure CLI をインストールします
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 参考:
#   - Azure CLI: https://learn.microsoft.com/en-us/cli/azure/
#

- name: Azure CLI をインストール
  community.general.homebrew:
    name: azure-cli
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  become: no
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
    HOMEBREW_NO_VERIFY_ATTESTATIONS: "1"
    HOMEBREW_CURL_RETRIES: "3"
    CURL_CA_BUNDLE: "{{ zscaler_ca_bundle_path | default(omit) }}"

- name: Azure CLI のバージョンを確認
  ansible.builtin.command: /home/linuxbrew/.linuxbrew/bin/az --version
  register: azure_cli_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"
  become: no

- name: Azure CLI インストール完了メッセージ
  ansible.builtin.debug:
    msg: |
      ================================================
      Azure CLI のインストールが完了しました！
      ================================================
      バージョン情報:
      {{ azure_cli_version.stdout_lines[0] | default('確認失敗') }}
      
      使用方法:
      # Azure にログイン
      az login
      
      # サブスクリプション一覧
      az account list --output table
      
      # リソースグループ一覧
      az group list --output table
      ================================================
