---
# ============================================================================
# topgrade ロール - タスク定義
# ============================================================================
#
# 目的:
#   topgrade（パッケージ一括更新ツール）をインストールします
#
# 前提条件:
#   - Linuxbrew がインストール済みであること
#
# 注意事項:
#   - Docker環境ではスキップします
#

- name: topgrade をインストール
  community.general.homebrew:
    name: topgrade
    state: present
    path: /home/linuxbrew/.linuxbrew/bin/brew
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"
  when: environment_type | default('') != 'docker'

- name: topgrade がスキップされたことを通知 (Docker環境)
  ansible.builtin.debug:
    msg: "Docker環境のため topgrade のインストールをスキップしました"
  when: environment_type | default('') == 'docker'
