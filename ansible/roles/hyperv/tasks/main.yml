---
# ============================================================================
# hyperv ロール - タスク定義
# ============================================================================
#
# 目的:
#   Hyper-V 固有の設定を行います
#

- name: Hyper-V 環境を確認
  ansible.builtin.debug:
    msg: "Hyper-V 環境でのセットアップを実行します"

- name: Hyper-V integration services を確認
  ansible.builtin.package:
    name: linux-virtual
    state: present
  become: yes
  when:
    - environment_type == 'hyperv'
    - ansible_facts['os_family'] == "Debian"
