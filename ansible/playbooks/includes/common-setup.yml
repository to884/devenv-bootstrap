---
# ============================================================================
# 共通セットアップ Playbook
# ============================================================================
#
# 目的:
#   全環境共通の初期セットアップを実行します
#
# 使用方法:
#   このファイルは各環境専用playbookから import_playbook で呼び出されます
#   直接実行することは推奨しません
#
# ============================================================================

- name: 共通セットアップ - 全環境共通
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    # インストールするロールのリスト（順序を保持）
    common_roles:
      - { name: sudo, tags: ['sudo', 'security'] }
      - { name: common, tags: ['common', 'packages'] }
      - { name: shell_config, tags: ['shell_config', 'shell', 'dotfiles'] }
      - { name: chezmoi, tags: ['chezmoi', 'dotfiles', 'tools'] }
      - { name: topgrade, tags: ['topgrade'] }
      - { name: uv, tags: ['uv', 'python'] }
      - { name: node, tags: ['node', 'nodejs', 'npm'] }
      - { name: starship, tags: ['starship', 'shell'] }
      - { name: bat, tags: ['bat', 'tools'] }
      - { name: shellcheck, tags: ['shellcheck', 'tools', 'scripting'] }
      - { name: delta, tags: ['delta', 'git', 'tools'] }
      - { name: gh, tags: ['gh', 'git', 'github', 'tools'] }
      - { name: copilot_cli, tags: ['copilot_cli', 'copilot', 'github', 'ai', 'tools'] }
      - { name: databricks_cli, tags: ['databricks_cli', 'databricks', 'data', 'tools'] }
      - { name: eza, tags: ['eza', 'tools'] }
      - { name: xh, tags: ['xh', 'tools', 'http'] }
      - { name: tmux, tags: ['tmux', 'tools'] }
      - { name: docker_install, tags: ['docker', 'docker_install'] }
      - { name: ssh, tags: ['ssh', 'security'] }

  tasks:
    # ============================================================================
    # Zscaler証明書の検出と設定
    # ============================================================================

    - name: Zscalerルート証明書の存在確認
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.certs/ZscalerRootCA.crt"
      register: zscaler_cert_stat
      become: no
      tags:
        - zscaler
        - certificates

    - name: Zscaler CA Bundle の存在確認
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.certs/ZscalerRootCA.pem"
      register: zscaler_ca_bundle_stat
      become: no
      tags:
        - zscaler
        - certificates

    - name: Zscaler証明書パスを設定（証明書が存在する場合のみ）
      ansible.builtin.set_fact:
        zscaler_cert_path: "{{ zscaler_cert_stat.stat.path }}"
        zscaler_ca_bundle_path: "{{ zscaler_ca_bundle_stat.stat.path }}"
      become: no
      when:
        - zscaler_cert_stat.stat.exists
        - zscaler_ca_bundle_stat.stat.exists
      tags:
        - zscaler
        - certificates

    - name: 共通セットアップ開始メッセージ
      ansible.builtin.debug:
        msg: |
          ================================================
          共通セットアップを開始します
          ================================================
          ホスト: {{ ansible_facts.hostname }}
          環境タイプ: {{ environment_type | default('unknown') }}
          ディストリビューション: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
          Zscaler証明書: {{ 'あり（SSL設定に使用します）' if (zscaler_cert_stat.stat.exists and zscaler_ca_bundle_stat.stat.exists) else 'なし（システムデフォルト証明書を使用します）' }}
          {{ '証明書パス: ' + zscaler_cert_path if (zscaler_cert_stat.stat.exists and zscaler_ca_bundle_stat.stat.exists) else '' }}
          {{ 'CA Bundle パス: ' + zscaler_ca_bundle_path if (zscaler_cert_stat.stat.exists and zscaler_ca_bundle_stat.stat.exists) else '' }}
          ※ 証明書のインストールはbootstrap.shで既に実施済みです
          ================================================
      tags:
        - always

    # ============================================================================
    # 共通ロールの適用
    # ============================================================================

    - name: 共通ロールを適用
      ansible.builtin.include_role:
        name: "{{ item.name }}"
        apply:
          tags: "{{ item.tags }}"
      loop: "{{ common_roles }}"
      tags:
        - always

- name: 共通セットアップ完了
  hosts: all
  gather_facts: no

  tasks:
    - name: 共通セットアップ完了メッセージ
      ansible.builtin.debug:
        msg: |
          ================================================
          共通セットアップが完了しました
          ================================================
          環境: {{ environment_type | default('unknown') }}
          次に環境固有のセットアップを実行します...
          ================================================
