---
# ============================================================================
# ブートストラップ Playbook (統合版)
# ============================================================================
#
# 目的:
#   全環境対応の汎用ブートストラップです
#   後方互換性を保ちながら、新しい分離構造も利用可能です
#
# 使用方法:
#   # 従来通りの使用（推奨）
#   ansible-playbook -i inventories/wsl/hosts playbooks/bootstrap.yml
#   ansible-playbook -i inventories/azure-vm/hosts playbooks/bootstrap.yml
#   ansible-playbook -i inventories/ec2/hosts playbooks/bootstrap.yml
#
#   # より明確な環境別playbook（新規推奨）
#   ansible-playbook -i inventories/wsl/hosts playbooks/bootstrap-wsl.yml
#   ansible-playbook -i inventories/azure-vm/hosts playbooks/bootstrap-azure-vm.yml
#   ansible-playbook -i inventories/ec2/hosts playbooks/bootstrap-ec2.yml
#
# Dry-run:
#   ansible-playbook -i inventories/wsl/hosts playbooks/bootstrap.yml --check
#
# 注意:
#   このファイルは後方互換性のため保持されています。
#   新しいプロジェクトでは環境別playbook (bootstrap-*.yml) の使用を推奨します。
#
# ============================================================================

# 共通セットアップを実行（分離された includes/common-setup.yml を使用）
- import_playbook: includes/common-setup.yml

# 環境固有のセットアップ（条件分岐により該当環境のみ実行）
- name: ブートストラップ - WSL固有の設定
  hosts: wsl
  become: yes
  gather_facts: yes

  tasks:
    - name: WSL ロールを適用
      ansible.builtin.include_role:
        name: wsl
      tags:
        - wsl

- name: ブートストラップ - Azure VM固有の設定
  hosts: azure_vm
  become: yes
  gather_facts: yes

  tasks:
    - name: Azure VM ロールを適用
      ansible.builtin.include_role:
        name: azure_vm
      tags:
        - azure_vm

- name: ブートストラップ - EC2固有の設定
  hosts: ec2
  become: yes
  gather_facts: yes

  tasks:
    - name: EC2 ロールを適用
      ansible.builtin.include_role:
        name: ec2
      tags:
        - ec2

- name: ブートストラップ - Hyper-V固有の設定
  hosts: hyperv
  become: yes
  gather_facts: yes

  tasks:
    - name: Hyper-V ロールを適用
      ansible.builtin.include_role:
        name: hyperv
      tags:
        - hyperv

- name: ブートストラップ - ベアメタル固有の設定
  hosts: baremetal
  become: yes
  gather_facts: yes

  tasks:
    - name: ベアメタル ロールを適用
      ansible.builtin.include_role:
        name: baremetal
      tags:
        - baremetal

- name: ブートストラップ - Docker固有の設定
  hosts: docker
  become: yes
  gather_facts: yes

  tasks:
    - name: Docker ロールを適用
      ansible.builtin.include_role:
        name: docker
      tags:
        - docker

- name: ブートストラップ完了
  hosts: all
  gather_facts: no

  tasks:
    - name: セットアップ完了メッセージ
      ansible.builtin.debug:
        msg: |
          ================================================
          ブートストラップが完了しました！（統合版）
          ================================================

          環境: {{ environment_type | default('unknown') }}

          次のステップ:
          1. シェルを再起動するか、以下を実行してLinuxbrewを有効化:
             eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

             ※ ~/.bashrc と ~/.zshrc には既に Linuxbrew の初期化コードが
                書き込まれています。次回ログイン時から自動的に有効化されます。

          2. Linuxbrew の動作確認:
             brew --version

          ================================================

          今後の推奨使用方法:
          より明確な環境別実行には以下を使用してください：
          - WSL: ansible-playbook -i inventories/wsl/hosts playbooks/bootstrap-wsl.yml
          - Azure VM: ansible-playbook -i inventories/azure-vm/hosts playbooks/bootstrap-azure-vm.yml
          - EC2: ansible-playbook -i inventories/ec2/hosts playbooks/bootstrap-ec2.yml
          - Hyper-V: ansible-playbook -i inventories/hyperv/hosts playbooks/bootstrap-hyperv.yml
          - ベアメタル: ansible-playbook -i inventories/baremetal/hosts playbooks/bootstrap-baremetal.yml
          - Docker: ansible-playbook -i inventories/docker/hosts playbooks/bootstrap-docker.yml
          ================================================
