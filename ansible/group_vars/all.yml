---
# ============================================================================
# グローバル変数定義
# ============================================================================
#
# すべてのホストとグループに適用される変数
#

# Python インタープリター
ansible_python_interpreter: /usr/bin/python3

# ユーザー設定
default_user: "{{ lookup('env', 'USER') | default('ansible') }}"
default_shell: /bin/bash

# Linuxbrew 設定
linuxbrew_path: /home/linuxbrew/.linuxbrew
linuxbrew_bin: "{{ linuxbrew_path }}/bin/brew"

# プロキシ設定（必要に応じて環境変数から取得）
http_proxy: "{{ lookup('env', 'http_proxy') | default('') }}"
https_proxy: "{{ lookup('env', 'https_proxy') | default('') }}"
no_proxy: "{{ lookup('env', 'no_proxy') | default('') }}"

# プロキシ有効判定フラグ（http_proxy または https_proxy が空でなければ true）
proxy_enabled: >-
	{{ (http_proxy | length > 0) or (https_proxy | length > 0) }}

# SSH 設定
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"

# セキュリティ設定
sudo_nopasswd: yes
keep_proxy_env: yes
keep_editor_env: yes

# Zscaler 証明書設定
# ホームディレクトリの .certs ディレクトリに配置された証明書を自動検出
# 注: zscaler_cert_path と zscaler_ca_bundle_path は playbook 内で動的に設定されます
# （facts 収集後に ansible_facts.env.HOME を使用）
# zscaler_cert_path: "{{ lookup('env', 'HOME') | default('/home/ubuntu') }}/.certs/ZscalerRootCA.crt"
# zscaler_ca_bundle_path: "{{ lookup('env', 'HOME') | default('/home/ubuntu') }}/.certs/ca-bundle.pem"
