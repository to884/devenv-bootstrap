[defaults]
# インベントリディレクトリの場所
# 実行時に -i オプションで環境別インベントリを指定することを推奨
# 例: ansible-playbook -i inventories/wsl/hosts site.yml
# inventory = ./inventories/

# ロールの検索パス
roles_path = ./roles

# ホストキーチェックを無効化（開発環境用）
host_key_checking = False

# タスク実行時の出力を読みやすくする（ansible-core 2.13以降）
stdout_callback = ansible.builtin.default
callback_result_format = yaml
# display_args_to_stdout = True  # TASKヘッダーに引数を表示しない（重複防止）

# 色付き出力を強制（パイプ/リダイレクト時も維持）
force_color = True

# 実行時間の計測とプロファイリング
# タイムスタンプと経過時間の出力を抑制するためコメントアウト
# callbacks_enabled = timer, profile_tasks, profile_roles

# スキップしたホストを非表示にして出力を簡潔に
display_skipped_hosts = False

# カスタム統計情報を表示
show_custom_stats = True

# fact変数の自動注入を無効化（ansible-core 2.24で廃止予定）
# ansible_facts["fact_name"] 形式を使用すること
inject_facts_as_vars = False

# fact収集のタイムアウト
gather_timeout = 30

# SSHパイプライン化を有効化してパフォーマンス向上
pipelining = True

# ログの保存先
log_path = ./ansible.log

[privilege_escalation]
# デフォルトでsudoを使用
become = True
become_method = sudo
become_user = root
become_ask_pass = False
