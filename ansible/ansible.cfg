[defaults]
# インベントリディレクトリの場所
# 実行時に -i オプションで環境別インベントリを指定することを推奨
# 例: ansible-playbook -i inventories/wsl/hosts site.yml
# inventory = ./inventories/

# ホストキーチェックを無効化（開発環境用）
host_key_checking = False

# タスク実行時の出力を読みやすくする
stdout_callback = yaml

# fact収集のタイムアウト
gather_timeout = 30

# SSHパイプライン化を有効化してパフォーマンス向上
pipelining = True

# ログの保存先
log_path = ./ansible.log

[privilege_escalation]
# デフォルトでsudoを使用
become = True
become_method = sudo
become_user = root
become_ask_pass = False
